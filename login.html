<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Smart Crop Advisor - Login</title>

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      width:100%;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#eaf7ea;
    }

    .container{
      width:90%;
      max-width:1100px;
      height:650px;
      background:white;
      display:flex;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 8px 20px rgba(0,0,0,0.2);
    }

    /* LEFT SIDE */

    .left{
      width:50%;
      background:
      linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
      url("https://images.unsplash.com/photo-1500937386664-56d1dfef3854?q=80&w=1600&auto=format&fit=crop");

      background-size:cover;
      background-position:center;

      color:white;

      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:40px;
    }

    .left-content h1{
      font-size:45px;
      margin-bottom:20px;
    }

    .left-content p{
      font-size:20px;
      line-height:1.6;
    }

    /* RIGHT SIDE */

    .right{
      width:50%;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px;
    }

    .login-box{
      width:100%;
      max-width:400px;
    }

    .login-box h2{
      text-align:center;
      margin-bottom:30px;
      color:#0a5c1b;
      font-size:35px;
    }

    .input-box{
      margin-bottom:20px;
      position:relative;
    }

    .input-box input{
      width:100%;
      padding:14px;
      border:1px solid #ccc;
      border-radius:8px;
      outline:none;
      font-size:16px;
    }

    .input-box i{
      position:absolute;
      right:15px;
      top:15px;
      cursor:pointer;
      color:#666;
    }

    .options{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
      font-size:14px;
    }

    .options a{
      text-decoration:none;
      color:#0a5c1b;
      font-weight:bold;
    }

    .btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:8px;
      background:#28a745;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    .btn:hover{
      background:#1f7d34;
    }

    .error{
      color:red;
      font-size:14px;
      margin-top:5px;
      display:none;
    }

    .register{
      text-align:center;
      margin-top:20px;
      font-size:15px;
    }

    .register a{
      color:#0a5c1b;
      text-decoration:none;
      font-weight:bold;
    }

    /* RESPONSIVE */

    @media(max-width:900px){

      .container{
        flex-direction:column;
        height:auto;
      }

      .left,
      .right{
        width:100%;
        height:350px;
      }

      .right{
        padding:30px;
      }

      .left-content h1{
        font-size:35px;
      }

      .left-content p{
        font-size:17px;
      }
    }

  </style>

</head>

<body>

  <div class="container">

    <!-- LEFT SIDE -->

    <div class="left">

      <div class="left-content">

        <h1>Smart Crop Advisor</h1>

        <p>
          “Agriculture is the most healthful,
          most useful and most noble employment of man.”
        </p>

      </div>

    </div>

    <!-- RIGHT SIDE -->

    <div class="right">

      <div class="login-box">

        <h2>Login</h2>

        <form id="loginForm">

          <!-- EMAIL -->

          <div class="input-box">

            <input
            type="text"
            id="email"
            placeholder="Enter Email or Mobile">

            <div class="error" id="emailError">
              Please enter email or mobile number
            </div>

          </div>

          <!-- PASSWORD -->

          <div class="input-box">

            <input
            type="password"
            id="password"
            placeholder="Enter Password">

            <i class="fa-solid fa-eye" id="togglePassword"></i>

            <div class="error" id="passwordError">
              Password must be at least 6 characters
            </div>

          </div>

          <!-- OPTIONS -->

          <div class="options">

            <label>
              <input type="checkbox">
              Remember Me
            </label>

            <a href="#">Forgot Password?</a>

          </div>

          <!-- BUTTON -->

          <button type="submit" class="btn">
            Login
          </button>

        </form>

        <div class="register">
          Don't have an account?
          <a href="#">Register</a>
        </div>

      </div>

    </div>

  </div>

  <!-- JAVASCRIPT -->

  <script>

    const togglePassword =
    document.getElementById("togglePassword");

    const password =
    document.getElementById("password");

    togglePassword.addEventListener("click", () => {

      if(password.type === "password"){

        password.type = "text";

        togglePassword.classList.remove("fa-eye");

        togglePassword.classList.add("fa-eye-slash");

      }

      else{

        password.type = "password";

        togglePassword.classList.remove("fa-eye-slash");

        togglePassword.classList.add("fa-eye");
      }

    });

    // FORM VALIDATION

    const form =
    document.getElementById("loginForm");

    form.addEventListener("submit", function(e){

      e.preventDefault();

      let valid = true;

      const email =
      document.getElementById("email").value.trim();

      const pass =
      document.getElementById("password").value.trim();

      const emailError =
      document.getElementById("emailError");

      const passwordError =
      document.getElementById("passwordError");

      // EMAIL CHECK

      if(email === ""){

        emailError.style.display = "block";

        valid = false;
      }

      else{

        emailError.style.display = "none";
      }

      // PASSWORD CHECK

      if(pass.length < 6){

        passwordError.style.display = "block";

        valid = false;
      }

      else{

        passwordError.style.display = "none";
      }

      // SUCCESS

      if(valid){

        alert("Login Successful!");
      }

    });

  </script>

</body>

</html>
