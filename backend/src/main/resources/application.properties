# ============================================================
#  SmartCropAdvisor - Backend Configuration File
#  Location: src/main/resources/application.properties
#
#  This file is the MAIN SETTINGS FILE for your Spring Boot app.
#  Spring Boot reads this file automatically when the app starts.
#  Every setting here controls how your app behaves ? database
#  connection, security, ports, AI module URL, etc.
#
#  IMPORTANT: Never push real passwords to GitHub.
#  Use environment variables or a .env approach in production.
# ============================================================


# ------------------------------------------------------------
# APP NAME
# This is just the internal name Spring uses to identify your
# app. You can keep it as-is or rename it.
# ------------------------------------------------------------
spring.application.name=smartcropadvisor-backend


# ============================================================
#  SECTION 1: DATABASE CONFIGURATION (MySQL)
#
#  These settings tell Spring Boot WHERE your MySQL database
#  is running and HOW to connect to it.
#  Spring Boot uses these to create a connection pool ? a set
#  of ready-to-use DB connections so each request doesn't
#  open a new connection from scratch.
# ============================================================

# The JDBC URL ? tells Spring which DB engine, host, port, and database name to connect to.
# Format: jdbc:mysql://<host>:<port>/<database_name>?<options>
#
# - localhost        ? DB is running on the same machine as the backend
# - 3306             ? default MySQL port (don't change unless you changed MySQL's port)
# - smart_crop_advisor ? the database name you created with: CREATE DATABASE smart_crop_advisor;
# - createDatabaseIfNotExist=true ? auto-creates the DB if it doesn't exist yet (handy for first run)
# - useSSL=false     ? disables SSL for local development (enable this in production)
# - serverTimezone=UTC ? avoids timezone mismatch errors between Java and MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/smart_crop_advisor?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC

# Your MySQL username ? the default is usually 'root' for local development.
# Replace this with whatever username you set when you installed MySQL.
spring.datasource.username=root

# Your MySQL password ? the password you set for the above username.
# TODO: Replace 'your_mysql_password' with your actual MySQL password before running.
spring.datasource.password=your_mysql_password

# The JDBC driver class ? this tells Java WHICH MySQL connector library to use.
# We already have 'mysql-connector-j' in pom.xml, so this class is available.
# You don't need to change this.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ============================================================
#  SECTION 2: JPA / HIBERNATE CONFIGURATION
#
#  JPA (Java Persistence API) is how Spring talks to the DB
#  using Java classes instead of raw SQL.
#  Hibernate is the JPA implementation doing the actual work
#  under the hood ? it converts your @Entity classes into
#  SQL tables and queries automatically.
# ============================================================

# DDL Auto ? controls whether Hibernate creates/updates tables automatically.
#
# Options:
#   create       ? drops all tables and recreates them on every startup (DANGER: loses all data)
#   create-drop  ? same as create, but also drops tables when app shuts down
#   update       ? compares your @Entity classes to existing tables and adds missing columns (SAFE for dev)
#   validate     ? checks that your entities match the DB schema but makes no changes
#   none         ? does nothing, you manage schema yourself (best for production)
#
# We use 'update' during development ? safe, and auto-reflects any new fields you add to entities.
# WHEN TO CHANGE: Switch to 'validate' or 'none' in production, and use Flyway/Liquibase for migrations.
spring.jpa.hibernate.ddl-auto=update

# Show SQL ? prints every SQL query Hibernate generates to the console.
# Very helpful for debugging ? you can see exactly what DB query runs for each request.
# Set to false in production (too noisy and can expose sensitive data in logs).
spring.jpa.show-sql=true

# Format SQL ? makes the printed SQL readable (indented, not one long line).
# Only matters when show-sql=true above.
spring.jpa.properties.hibernate.format_sql=true

# Hibernate Dialect ? tells Hibernate which SQL flavor to generate.
# Since we're on MySQL 8, we use the MySQL8 dialect.
# This controls things like data type mappings and function names in generated SQL.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Naming strategy ? controls how Java field names map to DB column names.
# SpringPhysicalNamingStrategy converts camelCase fields to snake_case columns.
# Example: 'createdAt' in Java ? 'created_at' in MySQL. Matches standard DB naming.
spring.jpa.hibernate.naming.physical-strategy=org.springframework.boot.orm.jpa.hibernate.SpringPhysicalNamingStrategy


# ============================================================
#  SECTION 3: SERVER CONFIGURATION
#
#  Controls on which port your Spring Boot app listens.
#  The frontend will call http://localhost:8080 ? this must match.
# ============================================================

# The port your backend API runs on.
# Default is 8080. Change this only if port 8080 is already in use on your machine.
# If you change this, tell Anubhav (frontend) so he can update REACT_APP_API_BASE_URL in his .env file.
server.port=8080

# Context path ? adds a prefix to all your URLs.
# We leave this empty; our controllers will use /api/v1 as a prefix manually via @RequestMapping.
# server.servlet.context-path=/api   ? we DON'T set this, controllers handle the prefix themselves


# ============================================================
#  SECTION 4: AI MODULE CONFIGURATION
#
#  The Python Flask server (Arpit Gupta's module) runs separately
#  on port 5000. Our RecommendService will call it using RestTemplate.
#  We store the base URL here so it's easy to change in one place.
# ============================================================

# Base URL of the Python AI/ML module.
# RecommendService.java reads this value using @Value("${ai.module.base-url}")
# and uses it to build URLs like: ai.module.base-url + "/predict/crop"
#
# During development: both services run on localhost.
# In production: replace with the deployed AI service URL (e.g. https://ai.smartcropadvisor.com)
ai.module.base-url=http://localhost:5000


# ============================================================
#  SECTION 5: JWT (JSON Web Token) CONFIGURATION
#
#  JWT is how we handle authentication. When a user logs in,
#  we generate a JWT token and send it back. The frontend stores
#  this token and sends it with every request in the Authorization header.
#  Our JwtUtil.java will read these two values.
# ============================================================

# Secret key used to SIGN the JWT token.
# This is like a password for signing ? if someone knows this, they can forge tokens.
# TODO: Use a long random string in production (at least 64 characters).
#       NEVER commit the real secret to GitHub. Use environment variables in production.
# Our JwtUtil.java reads this via: @Value("${jwt.secret}")
jwt.secret=smartcropadvisor_super_secret_jwt_key_2025_arpit_umrao

# Token expiration time in MILLISECONDS.
# 86400000 ms = 24 hours ? the token is valid for 1 day.
# After this time, the user must log in again.
# Our JwtUtil.java reads this via: @Value("${jwt.expiration}")
jwt.expiration=86400000


# ============================================================
#  SECTION 6: CORS CONFIGURATION
#
#  CORS (Cross-Origin Resource Sharing) is a browser security rule.
#  When the React frontend (running on port 3000) calls our backend
#  (running on port 8080), the browser blocks it by default because
#  the ports are different (different "origins").
#
#  We need to explicitly ALLOW the frontend origin.
#  Our SecurityConfig.java will use this value.
# ============================================================

# The URL of the React frontend.
# Spring Security's CORS config will allow requests from this URL.
# If Anubhav (frontend) changes his dev port, update this.
# In production, replace with the deployed frontend URL (e.g. https://www.smartcropadvisor.com)
cors.allowed-origin=http://localhost:3000


# ============================================================
#  SECTION 7: SPRING SECURITY - DISABLE DEFAULT LOGIN PAGE
#
#  When you add spring-boot-starter-security to pom.xml,
#  Spring Boot AUTOMATICALLY protects all endpoints and shows
#  a default HTML login page. We don't want that ? we're
#  building a REST API with JWT, not a web login form.
#
#  This setting disables that auto-generated form login.
#  Our SecurityConfig.java will replace it with JWT-based auth.
# ============================================================
spring.security.user.name=disabled
spring.security.user.password=disabled


# ============================================================
#  SECTION 8: LOGGING CONFIGURATION
#
#  Controls what gets printed to the console while the app runs.
#  Helpful for debugging during development.
# ============================================================

# Log level for our own application code.
# DEBUG = shows everything including method calls (very verbose, good for debugging)
# INFO  = shows normal app flow messages
# WARN  = only shows warnings and errors (use in production)
logging.level.com.smartcropadvisor=DEBUG

# Log level for Spring Security ? shows what decisions the security layer makes.
# Useful to debug "why is my request getting 403 Forbidden?" type issues.
logging.level.org.springframework.security=DEBUG

# Log level for Hibernate SQL ? shows the actual SQL queries with parameter values.
# Set to TRACE to see bound parameters (e.g. WHERE email = 'farmer@gmail.com')
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE